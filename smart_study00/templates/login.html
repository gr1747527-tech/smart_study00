<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Study AI — Login</title>
    
    <!-- Google Identity Services Library -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --bg: #04040d;
            --text: #f2f2fa;
            --sub: #8888b8;
            --accent1: #6366f1;
            --accent2: #06b6d4;
            --glass: rgba(14,14,36,0.7);
            --border: rgba(255,255,255,0.05);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .luxury-bg {
            position: fixed;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(ellipse at 20% 20%, rgba(99,102,241,0.1) 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 80%, rgba(6,182,212,0.08) 0%, transparent 60%);
        }
        
        .card {
            width: 100%;
            max-width: 420px;
            background: var(--glass);
            backdrop-filter: blur(60px);
            border-radius: 30px;
            border: 1px solid var(--border);
            padding: 45px 35px;
            position: relative;
            z-index: 10;
        }
        
        .logo {
            width: 70px;
            height: 70px;
            margin: 0 auto 15px;
            background: linear-gradient(135deg, var(--accent1), var(--accent2));
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            box-shadow: 0 12px 35px rgba(99,102,241,0.4);
        }
        
        h1 {
            font-family: 'Orbitron', sans-serif;
            text-align: center;
            font-size: 1.8em;
            color: #fff;
            margin-bottom: 5px;
        }
        
        .sub {
            text-align: center;
            color: var(--sub);
            font-size: 0.8em;
            margin-bottom: 28px;
        }
        
        .flash {
            padding: 10px 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 13px;
        }
        
        .flash.error {
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.3);
            color: #fca5a5;
        }
        
        .input-group {
            margin-bottom: 16px;
        }
        
        label {
            display: block;
            color: var(--sub);
            margin-bottom: 6px;
            font-size: 0.75em;
            text-transform: uppercase;
        }
        
        input {
            width: 100%;
            padding: 14px;
            border: 2px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            background: rgba(0,0,0,0.4);
            color: #fff;
            font-size: 15px;
            outline: none;
        }
        
        input:focus {
            border-color: var(--accent2);
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--accent1), var(--accent2));
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 5px;
        }
        
        .btn:hover {
            opacity: 0.9;
        }
        
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 22px 0;
        }
        
        .divider-line {
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.08);
        }
        
        .divider-text {
            color: rgba(255,255,255,0.3);
            font-size: 11px;
        }
        
        .footer {
            text-align: center;
            margin-top: 22px;
            color: var(--sub);
            font-size: 0.8em;
        }
        
        .footer a {
            color: #f59e0b;
            text-decoration: none;
        }

        .google-btn-wrapper {
            display: flex;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="luxury-bg"></div>
    
    <div class="card">
        <div class="logo">📚</div>
        <h1>Smart Study AI</h1>
        <p class="sub">✦ Login to Your Account ✦</p>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <form method="POST">
            <div class="input-group">
                <label>📧 Email</label>
                <input type="email" name="email" placeholder="Enter your email" required autofocus>
            </div>
            <div class="input-group">
                <label>🔒 Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn">🚀 Sign In</button>
        </form>
        
        <div class="divider">
            <div class="divider-line"></div>
            <span class="divider-text">OR</span>
            <div class="divider-line"></div>
        </div>
        
        <!-- ✅ Google Sign-In Button (Client ID Hardcoded) -->
        <div class="google-btn-wrapper">
            <div id="g_id_onload"
                 data-client_id="277477438725-rij0soje78ekof9j00aade2j0k1042k3.apps.googleusercontent.com"
                 data-context="signin"
                 data-ux_mode="popup"
                 data-callback="handleGoogleResponse"
                 data-auto_prompt="false"
                 data-itp_support="true">
            </div>

            <div class="g_id_signin"
                 data-type="standard"
                 data-shape="rectangular"
                 data-theme="filled_black"
                 data-text="continue_with"
                 data-size="large"
                 data-logo_alignment="left"
                 data-width="300">
            </div>
        </div>
        
        <div class="footer">
            Don't have an account? <a href="{{ url_for('register') }}">Create one</a>
        </div>
    </div>

    <script>
        function handleGoogleResponse(response) {
            console.log("✅ Google Sign-In successful. Token received.");
            
            fetch('/api/google-callback', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    credential: response.credential
                })
            })
            .then(res => {
                if (!res.ok) {
                    throw new Error('Server error: ' + res.status);
                }
                return res.json();
            })
            .then(data => {
                if (data.success) {
                    window.location.href = data.redirect || '/dashboard';
                } else {
                    alert('Google Sign-In failed: ' + (data.error || 'Unknown error'));
                }
            })
            .catch(err => {
                console.error('❌ Error:', err);
                alert('Network error: ' + err.message);
            });
        }
    </script>
</body>
</html>
