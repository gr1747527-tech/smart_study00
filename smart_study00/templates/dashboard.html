<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#06060f">
    <title>Smart Study AI – Intelligent Assistant</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Orbitron:wght@400;600;700;900&family=JetBrains+Mono:wght@400;600;700&display=swap');

        :root {
            --bg-deep: #04040d; --bg-primary: #08081a; --bg-secondary: #0e0e24;
            --text-primary: #f2f2fa; --text-secondary: #8888b8; --text-muted: #555580;
            --accent-1: #6366f1; --accent-2: #06b6d4; --accent-3: #f59e0b; --accent-4: #ec4899; --accent-5: #10b981;
            --glass-bg: rgba(14,14,36,0.7); --glass-border: rgba(255,255,255,0.05);
            --shadow-3d: 0 30px 80px rgba(0,0,0,0.6); --sidebar-width: 290px;
            --transition: 0.5s cubic-bezier(0.22, 0.61, 0.36, 1);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        html { font-size:16px; }
        body { font-family:'Inter',sans-serif; background:var(--bg-deep); color:var(--text-primary); height:100vh; height:100dvh; display:flex; overflow:hidden; -webkit-font-smoothing:antialiased; }

        .luxury-bg { position:fixed; inset:0; z-index:0; pointer-events:none; background: radial-gradient(ellipse at 20% 20%, rgba(99,102,241,0.08) 0%, transparent 60%), radial-gradient(ellipse at 80% 80%, rgba(6,182,212,0.06) 0%, transparent 60%); }
        .gradient-mesh { position:fixed; inset:0; z-index:0; pointer-events:none; opacity:0.4; }
        .gradient-mesh::before, .gradient-mesh::after { content:''; position:absolute; border-radius:50%; filter:blur(180px); animation:meshFloat 20s ease-in-out infinite; }
        .gradient-mesh::before { width:600px; height:600px; background:radial-gradient(circle, rgba(99,102,241,0.25), transparent 70%); top:-100px; left:-50px; }
        .gradient-mesh::after { width:500px; height:500px; background:radial-gradient(circle, rgba(6,182,212,0.2), transparent 70%); bottom:-80px; right:-40px; animation-delay:-10s; }
        @keyframes meshFloat { 0%,100%{transform:translate(0,0)scale(1)} 33%{transform:translate(60px,-40px)scale(1.15)} 66%{transform:translate(-30px,50px)scale(0.9)} }

        /* ── SIDEBAR ── */
        .sidebar { width:var(--sidebar-width); height:100vh; height:100dvh; background:var(--glass-bg); backdrop-filter:blur(80px) saturate(200%); -webkit-backdrop-filter:blur(80px) saturate(200%); border-right:1px solid var(--glass-border); display:flex; flex-direction:column; flex-shrink:0; z-index:50; transition:transform var(--transition); box-shadow:8px 0 60px rgba(0,0,0,0.5); }
        .sidebar-header { padding:30px 24px 24px; border-bottom:1px solid var(--glass-border); }
        .sidebar-logo { display:flex; align-items:center; gap:14px; }
        .logo-premium { width:48px; height:48px; background:linear-gradient(135deg, var(--accent-1), var(--accent-2), var(--accent-4), var(--accent-3)); background-size:400% 400%; animation:logoGradient 5s ease-in-out infinite; border-radius:18px; display:flex; align-items:center; justify-content:center; font-size:28px; box-shadow:0 16px 50px rgba(99,102,241,0.5); }
        @keyframes logoGradient { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }
        .sidebar-logo-text { font-family:'Orbitron',sans-serif; font-size:21px; font-weight:900; background:linear-gradient(135deg, #fff, var(--accent-2)); background-clip:text; -webkit-background-clip:text; -webkit-text-fill-color:transparent; letter-spacing:2px; }
        .sidebar-logo-sub { font-size:10px; color:var(--text-muted); letter-spacing:4px; text-transform:uppercase; font-family:'Orbitron',sans-serif; }
        .new-chat-btn { margin:20px 16px; padding:16px 22px; background:linear-gradient(135deg, rgba(99,102,241,0.1), rgba(6,182,212,0.06)); border:1px solid rgba(99,102,241,0.2); border-radius:18px; color:#fff; cursor:pointer; font-size:13px; font-weight:600; transition:all var(--transition); display:flex; align-items:center; gap:10px; }
        .new-chat-btn:hover { border-color:var(--accent-2); transform:translateX(8px); box-shadow:0 10px 40px rgba(99,102,241,0.3); }
        .chat-list { flex:1; overflow-y:auto; padding:8px 12px; }
        .sidebar-footer { padding:18px 20px; border-top:1px solid var(--glass-border); display:flex; align-items:center; gap:12px; font-size:13px; color:var(--text-secondary); }
        .user-avatar { width:38px; height:38px; border-radius:14px; background:linear-gradient(135deg, var(--accent-1), var(--accent-2)); display:flex; align-items:center; justify-content:center; font-size:16px; color:#fff; font-weight:700; }
        .sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:45; backdrop-filter:blur(8px); }
        .sidebar-overlay.active { display:block; }
        .sidebar-toggle { display:none; position:fixed; top:16px; left:16px; z-index:55; width:46px; height:46px; border-radius:16px; background:var(--glass-bg); backdrop-filter:blur(40px); border:1px solid var(--glass-border); color:#fff; cursor:pointer; font-size:24px; align-items:center; justify-content:center; box-shadow:var(--shadow-3d); }

        /* ── MAIN AREA ── */
        .main-area { flex:1; display:flex; flex-direction:column; min-width:0; position:relative; z-index:1; }
        .main-header { height:64px; border-bottom:1px solid var(--glass-border); display:flex; align-items:center; padding:0 30px; justify-content:space-between; background:var(--glass-bg); backdrop-filter:blur(50px); }
        .main-header-title { font-family:'Orbitron',sans-serif; font-size:13px; font-weight:700; background:linear-gradient(135deg, var(--text-secondary), var(--accent-2)); background-clip:text; -webkit-background-clip:text; -webkit-text-fill-color:transparent; letter-spacing:3px; }
        .header-actions { display:flex; gap:14px; align-items:center; }
        .icon-btn { width:44px; height:44px; border-radius:14px; border:1px solid var(--glass-border); background:rgba(255,255,255,0.02); color:var(--text-secondary); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.35s; font-size:18px; backdrop-filter:blur(20px); }
        .icon-btn:hover { background:rgba(99,102,241,0.25); color:#fff; border-color:var(--accent-1); transform:translateY(-4px); box-shadow:0 12px 40px rgba(99,102,241,0.35); }
        .icon-btn.on { background:rgba(16,185,129,0.2); border-color:var(--accent-5); color:var(--accent-5); box-shadow:0 0 30px rgba(16,185,129,0.3); }

        /* ── CHAT ── */
        .chat-container { flex:1; overflow-y:auto; padding:40px 30px; display:flex; flex-direction:column; gap:28px; }
        .welcome-screen { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:40px; }
        .welcome-logo { font-size:70px; margin-bottom:20px; }
        .welcome-title { font-family:'Orbitron',sans-serif; font-size:32px; font-weight:700; color:#fff; }
        .welcome-subtitle { color:var(--text-secondary); margin:12px 0 30px; font-size:15px; }

        .mode-selector-center { display:flex; gap:20px; margin-bottom:40px; background:rgba(255,255,255,0.02); border:1px solid var(--glass-border); border-radius:20px; padding:8px; }
        .mode-btn-big { padding:14px 32px; border:none; border-radius:16px; background:transparent; color:var(--text-secondary); cursor:pointer; font-family:'Inter',sans-serif; font-size:15px; font-weight:700; transition:all 0.5s; letter-spacing:0.5px; }
        .mode-btn-big.active { background:linear-gradient(135deg, var(--accent-1), var(--accent-2)); color:#fff; box-shadow:0 12px 35px rgba(99,102,241,0.5); transform:scale(1.05); }
        .mode-btn-big:hover:not(.active) { color:#fff; background:rgba(99,102,241,0.2); }

        .message { display:flex; gap:16px; max-width:75%; animation:msgSlide 0.4s cubic-bezier(0.22,0.61,0.36,1); position:relative; }
        @keyframes msgSlide { from{opacity:0;transform:translateY(30px)scale(0.95)} to{opacity:1;transform:translateY(0)scale(1)} }
        .message.user { align-self:flex-end; flex-direction:row-reverse; }
        .message-avatar { width:42px; height:42px; border-radius:16px; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
        .message.user .message-avatar { background:linear-gradient(135deg, var(--accent-1), var(--accent-2)); }
        .message.assistant .message-avatar { background:var(--bg-secondary); border:1px solid var(--glass-border); }
        .message-content { background:linear-gradient(135deg, rgba(99,102,241,0.15), rgba(6,182,212,0.06)); padding:16px 22px; border-radius:20px; font-size:14.5px; line-height:1.8; border:1px solid rgba(99,102,241,0.18); word-wrap:break-word; position:relative; }
        .message.user .message-content { cursor:pointer; transition: all 0.2s; }
        .message.user .message-content:hover { background:linear-gradient(135deg, rgba(99,102,241,0.25), rgba(6,182,212,0.12)); border-color:rgba(99,102,241,0.4); }

        /* Floating action menu below user message */
        .msg-action-menu { position:absolute; background:rgba(20,20,40,0.95); backdrop-filter:blur(12px); border:1px solid var(--glass-border); border-radius:12px; display:flex; gap:6px; padding:6px 8px; z-index:100; box-shadow:0 8px 20px rgba(0,0,0,0.4); animation:fadeIn 0.15s ease; }
        .msg-action-menu button { background:rgba(255,255,255,0.08); border:none; border-radius:8px; padding:5px 12px; font-size:12px; font-weight:600; cursor:pointer; transition:all 0.2s; color:var(--text-primary); display:flex; align-items:center; gap:6px; }
        .msg-action-menu button:hover { background:var(--accent-1); transform:scale(1.02); }
        @keyframes fadeIn { from{opacity:0;transform:translateY(-5px);} to{opacity:1;transform:translateY(0);} }

        /* Thinking indicator (emoji + dots) */
        .thinking-indicator { display:flex; align-items:center; gap:12px; }
        .thinking-emoji { font-size:32px; animation:thinkPulse 1.2s infinite; display:inline-block; }
        @keyframes thinkPulse { 0%,100%{transform:scale(1); opacity:0.6} 50%{transform:scale(1.2); opacity:1} }
        .thinking-text { font-size:15px; font-weight:500; color:var(--text-secondary); }
        .thinking-dots { display:inline-flex; gap:3px; margin-left:2px; }
        .thinking-dots span { width:4px; height:4px; background:var(--text-secondary); border-radius:50%; animation:dotBounce 1.4s infinite ease-in-out; }
        .thinking-dots span:nth-child(1) { animation-delay:0s; }
        .thinking-dots span:nth-child(2) { animation-delay:0.2s; }
        .thinking-dots span:nth-child(3) { animation-delay:0.4s; }
        @keyframes dotBounce { 0%,80%,100%{transform:scale(0); opacity:0.3} 40%{transform:scale(1); opacity:1} }

        .edit-textarea { width:100%; min-height:60px; background:rgba(0,0,0,0.5); border:1px solid var(--accent-2); border-radius:12px; color:#fff; padding:10px; font-family:'Inter',sans-serif; font-size:14px; resize:vertical; }
        .edit-actions { display:flex; gap:6px; margin-top:6px; }
        .edit-save, .edit-cancel { padding:5px 14px; border-radius:8px; border:none; cursor:pointer; font-size:12px; font-weight:600; }
        .edit-save { background:var(--accent-1); color:#fff; }
        .edit-cancel { background:rgba(255,255,255,0.1); color:var(--text-secondary); border:1px solid var(--glass-border); }

        .input-area { padding:20px 30px; border-top:1px solid var(--glass-border); }
        .input-container { display:flex; gap:16px; align-items:flex-end; background:var(--glass-bg); border:2px solid var(--glass-border); border-radius:24px; padding:14px 20px; transition:all var(--transition); backdrop-filter:blur(40px); }
        .input-container:focus-within { border-color:var(--accent-1); box-shadow:0 0 60px rgba(99,102,241,0.25); transform:translateY(-3px); }
        .chat-input { flex:1; background:transparent; border:none; color:var(--text-primary); font-size:15px; font-family:'Inter',sans-serif; resize:none; outline:none; min-height:26px; max-height:200px; padding:10px 0; }
        .chat-input::placeholder { color:var(--text-muted); }
        .send-btn { width:50px; height:50px; border-radius:16px; background:linear-gradient(135deg, var(--accent-1), var(--accent-2)); border:none; color:#fff; cursor:pointer; font-size:22px; display:flex; align-items:center; justify-content:center; transition:all var(--transition); flex-shrink:0; box-shadow:0 10px 30px rgba(99,102,241,0.5); }
        .send-btn::after { content:'→'; font-size:24px; }
        .send-btn:hover { transform:scale(1.1); box-shadow:0 16px 50px rgba(99,102,241,0.7); }

        /* ============================================= */
        /* 📱 FULLY RESPONSIVE MEDIA QUERIES - ALL DEVICES */
        /* ============================================= */
        @media (min-width: 1920px) {
            :root { --sidebar-width: 340px; }
            html { font-size: 18px; }
            .chat-container { padding: 50px 80px; gap: 32px; }
            .message { max-width: 65%; }
            .message-content { font-size: 16px; padding: 20px 28px; }
            .welcome-logo { font-size: 90px; }
            .welcome-title { font-size: 40px; }
            .logo-premium { width: 56px; height: 56px; font-size: 32px; }
            .new-chat-btn { padding: 18px 24px; font-size: 15px; }
            .send-btn { width: 56px; height: 56px; }
            .send-btn::after { font-size: 26px; }
            .icon-btn { width: 48px; height: 48px; }
            .thinking-emoji { font-size: 40px; }
            .thinking-text { font-size: 17px; }
            .mode-btn-big { padding: 16px 36px; font-size: 16px; }
            .header-actions { gap: 16px; }
        }
        @media (min-width: 1440px) and (max-width: 1919px) {
            :root { --sidebar-width: 310px; }
            html { font-size: 17px; }
            .chat-container { padding: 45px 60px; gap: 30px; }
            .message { max-width: 68%; }
            .message-content { font-size: 15px; padding: 18px 26px; }
            .welcome-logo { font-size: 80px; }
            .welcome-title { font-size: 36px; }
            .send-btn { width: 52px; height: 52px; }
            .thinking-emoji { font-size: 36px; }
        }
        @media (min-width: 1025px) and (max-width: 1439px) {
            .chat-container { padding: 40px 50px; }
            .message { max-width: 72%; }
            .message-content { font-size: 14px; }
            .welcome-logo { font-size: 70px; }
        }
        @media (min-width: 769px) and (max-width: 1024px) {
            :root { --sidebar-width: 260px; }
            html { font-size: 15px; }
            .sidebar { width: 260px; }
            .sidebar-header { padding: 24px 20px 20px; }
            .sidebar-logo-text { font-size: 18px; }
            .logo-premium { width: 42px; height: 42px; font-size: 22px; }
            .chat-container { padding: 30px 28px; gap: 24px; }
            .message { max-width: 80%; }
            .message-content { padding: 14px 20px; font-size: 13.5px; }
            .message-avatar { width: 38px; height: 38px; font-size: 18px; }
            .welcome-logo { font-size: 60px; }
            .welcome-title { font-size: 28px; }
            .welcome-subtitle { font-size: 13px; }
            .mode-selector-center { gap: 12px; }
            .mode-btn-big { padding: 12px 24px; font-size: 14px; }
            .main-header { padding: 0 24px; }
            .main-header-title { font-size: 11px; }
            .icon-btn { width: 40px; height: 40px; font-size: 16px; }
            .input-area { padding: 18px 24px; }
            .input-container { padding: 12px 16px; gap: 12px; }
            .chat-input { font-size: 14px; }
            .send-btn { width: 46px; height: 46px; }
            .send-btn::after { font-size: 20px; }
            .thinking-emoji { font-size: 30px; }
            .thinking-text { font-size: 14px; }
            .msg-action-menu button { padding: 4px 10px; font-size: 11px; }
        }
        @media (max-width: 768px) {
            :root { --sidebar-width: 280px; }
            html { font-size: 14px; }
            .sidebar { position: fixed; left: -100%; top: 0; height: 100vh; height: 100dvh; width: 280px; z-index: 60; transition: left 0.4s cubic-bezier(0.22, 0.61, 0.36, 1); }
            .sidebar.open { left: 0; }
            .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 55; backdrop-filter: blur(6px); }
            .sidebar-overlay.active { display: block; }
            .sidebar-toggle { display: flex; position: fixed; top: 12px; left: 12px; z-index: 65; width: 42px; height: 42px; border-radius: 14px; background: var(--glass-bg); backdrop-filter: blur(40px); border: 1px solid var(--glass-border); color: #fff; cursor: pointer; font-size: 20px; align-items: center; justify-content: center; box-shadow: var(--shadow-3d); }
            .main-header { padding: 0 16px 0 60px; height: 56px; }
            .main-header-title { font-size: 10px; letter-spacing: 2px; }
            .header-actions { gap: 8px; }
            .icon-btn { width: 36px; height: 36px; font-size: 14px; border-radius: 12px; }
            .chat-container { padding: 20px 16px; gap: 20px; }
            .message { max-width: 85%; gap: 10px; }
            .message-content { padding: 12px 16px; font-size: 13px; border-radius: 16px; }
            .message-avatar { width: 32px; height: 32px; font-size: 16px; border-radius: 12px; }
            .welcome-screen { padding: 30px 16px; }
            .welcome-logo { font-size: 52px; margin-bottom: 16px; }
            .welcome-title { font-size: 24px; }
            .welcome-subtitle { font-size: 12px; margin: 10px 0 24px; }
            .mode-selector-center { flex-direction: column; gap: 10px; padding: 6px; border-radius: 16px; width: 100%; }
            .mode-btn-big { padding: 10px 20px; font-size: 13px; width: 100%; }
            .input-area { padding: 14px 12px; }
            .input-container { padding: 10px 14px; border-radius: 18px; gap: 10px; }
            .chat-input { font-size: 13px; min-height: 22px; }
            .send-btn { width: 40px; height: 40px; border-radius: 12px; }
            .send-btn::after { font-size: 18px; }
            .thinking-emoji { font-size: 28px; }
            .thinking-text { font-size: 13px; }
            .msg-action-menu { gap: 4px; padding: 5px 6px; }
            .msg-action-menu button { padding: 4px 8px; font-size: 11px; }
            .edit-textarea { font-size: 12px; min-height: 50px; }
            .edit-save, .edit-cancel { font-size: 11px; padding: 4px 10px; }
        }
        @media (max-width: 640px) {
            .message { max-width: 90%; }
            .message-content { padding: 10px 14px; font-size: 12.5px; }
            .welcome-logo { font-size: 48px; }
            .welcome-title { font-size: 22px; }
            .msg-action-menu button { padding: 3px 8px; font-size: 10px; }
        }
        @media (max-width: 480px) {
            :root { --sidebar-width: 260px; }
            html { font-size: 13px; }
            .sidebar { width: 260px; }
            .sidebar-toggle { top: 10px; left: 10px; width: 38px; height: 38px; font-size: 18px; border-radius: 12px; }
            .main-header { padding: 0 12px 0 54px; height: 52px; }
            .main-header-title { font-size: 9px; letter-spacing: 1px; }
            .icon-btn { width: 32px; height: 32px; font-size: 13px; border-radius: 10px; }
            .chat-container { padding: 16px 12px; gap: 16px; }
            .message { max-width: 92%; gap: 8px; }
            .message-content { padding: 9px 12px; font-size: 12px; border-radius: 14px; }
            .message-avatar { width: 28px; height: 28px; font-size: 13px; border-radius: 10px; }
            .welcome-logo { font-size: 44px; }
            .welcome-title { font-size: 20px; }
            .welcome-subtitle { font-size: 11px; margin: 8px 0 20px; }
            .mode-btn-big { padding: 8px 16px; font-size: 12px; }
            .input-area { padding: 12px 8px; }
            .input-container { padding: 8px 12px; border-radius: 16px; gap: 8px; }
            .chat-input { font-size: 12px; }
            .send-btn { width: 36px; height: 36px; border-radius: 10px; }
            .send-btn::after { font-size: 16px; }
            .thinking-emoji { font-size: 24px; }
            .thinking-text { font-size: 12px; }
            .msg-action-menu button { padding: 3px 6px; font-size: 9px; gap: 4px; }
            .edit-textarea { font-size: 11px; min-height: 44px; padding: 8px; }
            .edit-save, .edit-cancel { font-size: 10px; padding: 3px 8px; }
        }
        @media (max-width: 360px) {
            :root { --sidebar-width: 240px; }
            html { font-size: 12px; }
            .sidebar { width: 240px; }
            .sidebar-toggle { top: 8px; left: 8px; width: 34px; height: 34px; font-size: 16px; border-radius: 10px; }
            .main-header { padding: 0 10px 0 48px; height: 48px; }
            .icon-btn { width: 28px; height: 28px; font-size: 12px; border-radius: 8px; }
            .chat-container { padding: 12px 10px; gap: 14px; }
            .message { max-width: 95%; gap: 6px; }
            .message-content { padding: 8px 10px; font-size: 11px; border-radius: 12px; line-height: 1.5; }
            .message-avatar { width: 24px; height: 24px; font-size: 11px; border-radius: 8px; }
            .welcome-logo { font-size: 38px; }
            .welcome-title { font-size: 18px; }
            .welcome-subtitle { font-size: 10px; }
            .mode-btn-big { padding: 7px 14px; font-size: 11px; }
            .input-container { padding: 6px 10px; gap: 6px; }
            .chat-input { font-size: 11px; }
            .send-btn { width: 32px; height: 32px; border-radius: 8px; }
            .send-btn::after { font-size: 14px; }
            .thinking-emoji { font-size: 20px; }
            .thinking-text { font-size: 11px; }
            .msg-action-menu button { padding: 2px 5px; font-size: 8px; }
            .edit-textarea { font-size: 10px; min-height: 40px; }
        }
        @media (orientation: landscape) and (max-height: 500px) {
            .sidebar { height: 100vh; }
            .chat-container { padding: 12px 16px; gap: 12px; }
            .welcome-screen { padding: 20px; }
            .message { max-width: 80%; }
            .input-area { padding: 8px 12px; }
            .main-header { height: 48px; }
            .message-avatar { width: 28px; height: 28px; font-size: 14px; }
            .message-content { padding: 8px 12px; font-size: 12px; }
        }
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
        }
        @media (hover: none) and (pointer: coarse) {
            .icon-btn:hover { transform: none; box-shadow: none; background: rgba(255,255,255,0.02); }
            .send-btn:hover { transform: none; }
            .new-chat-btn:hover { transform: none; }
            .mode-btn-big:hover:not(.active) { background: transparent; color: var(--text-secondary); }
            .message.user .message-content:hover { background: linear-gradient(135deg, rgba(99,102,241,0.15), rgba(6,182,212,0.06)); border-color: rgba(99,102,241,0.18); }
        }
    </style>
</head>
<body>
    <div class="luxury-bg"></div>
    <div class="gradient-mesh"></div>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
    <button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()">☰</button>

    <input type="hidden" id="dataUsername" value="{{ username }}">
    <input type="hidden" id="dataUserInitial" value="{{ username[0] | upper }}">
    <input type="hidden" id="dataShowWelcome" value="{{ show_welcome | default(false) | lower }}">
    <input type="hidden" id="dataWelcomeName" value="{{ welcome_name | default('') }}">

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">
                <div class="logo-premium">📚</div>
                <div>
                    <div class="sidebar-logo-text">SMART STUDY</div>
                    <div class="sidebar-logo-sub">Fast Learning</div>
                </div>
            </div>
        </div>
        <button class="new-chat-btn" onclick="newChat(); if(window.innerWidth<=768) toggleSidebar();">
            <span>✦</span> New Question
        </button>
        <div class="chat-list" id="chatList"></div>
        <div class="sidebar-footer">
            <div class="user-avatar" id="sidebarAvatar"></div>
            <span id="sidebarUsername"></span>
            <a href="/logout" style="margin-left:auto;color:var(--text-secondary);text-decoration:none;font-size:12px;font-weight:600;">Logout</a>
        </div>
    </div>

    <div class="main-area">
        <div class="main-header">
            <span class="main-header-title">✦ SMART STUDY</span>
            <div class="header-actions">
                <!-- Image upload icon removed as requested -->
                <button class="icon-btn" id="voiceBtn" onclick="toggleVoice()">🔇</button>
                <a href="/history" class="icon-btn" style="text-decoration:none;">📜</a>
            </div>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="welcome-screen" id="welcomeScreen">
                <div class="welcome-logo">📚</div>
                <h2 class="welcome-title">Smart Study AI</h2>
                <p class="welcome-subtitle">Ask anything – get instant, intelligent answers!</p>
                <div class="mode-selector-center" id="modeSelectorCenter">
                    <button class="mode-btn-big active" onclick="setMode('instant',this)">⚡ Fast Answer</button>
                    <button class="mode-btn-big" onclick="setMode('expert',this)">🎓 Deep Learn</button>
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-container">
                <textarea class="chat-input" id="chatInput" placeholder="Type your question here..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
                <button class="send-btn" onclick="sendMessage()"></button>
            </div>
        </div>
    </div>

    <audio id="audioPlayer" style="display:none"></audio>

    <script>
        const getElem = (id) => document.getElementById(id);
        const USERNAME = getElem('dataUsername')?.value || 'User';
        const USER_INITIAL = getElem('dataUserInitial')?.value || 'U';
        const SHOW_WELCOME = getElem('dataShowWelcome')?.value === 'true';
        const WELCOME_NAME = getElem('dataWelcomeName')?.value || '';

        if (getElem('sidebarAvatar')) getElem('sidebarAvatar').textContent = USER_INITIAL;
        if (getElem('sidebarUsername')) getElem('sidebarUsername').textContent = USERNAME;

        let currentChatId = generateId(), currentMode = 'instant', voiceEnabled = false;
        let currentAudio = null, lastAssistantAudio = null, replayCount = 0;
        const MAX_REPLAYS = 10;
        let requestId = 0, thinkingEl = null;
        let activeMenu = null;
        // For 4-second minimum thinking time
        let thinkingStartTime = 0;
        let pendingResponse = null;

        function generateId(){ return 'chat_'+Date.now()+'_'+Math.random().toString(36).substr(2,9); }
        function toggleSidebar(){ getElem('sidebar').classList.toggle('open'); getElem('sidebarOverlay').classList.toggle('active'); }

        function setMode(mode, btn) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn-big').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        // VOICE functions
        function toggleVoice() {
            voiceEnabled = !voiceEnabled;
            const btn = getElem('voiceBtn');
            if (voiceEnabled) {
                btn.classList.add('on'); btn.textContent = '🔊';
                if (lastAssistantAudio && replayCount < MAX_REPLAYS) {
                    playAudioFromBase64(lastAssistantAudio);
                }
            } else {
                btn.classList.remove('on'); btn.textContent = '🔇';
                stopAudio();
            }
        }
        function stopAudio() {
            if (currentAudio) { 
                currentAudio.pause(); 
                currentAudio.src = ''; 
                currentAudio.load(); 
                currentAudio = null; 
            }
        }
        function playAudioFromBase64(b64) {
            if (!voiceEnabled) return;
            stopAudio();
            const audio = getElem('audioPlayer');
            audio.src = 'data:audio/mp3;base64,' + b64;
            currentAudio = audio;
            audio.onended = () => { currentAudio = null; };
            audio.onerror = () => { currentAudio = null; };
            audio.play().catch(() => {});
        }
        function replayLastAssistant() {
            if (!voiceEnabled) { alert('Turn on speaker first.'); return; }
            if (!lastAssistantAudio) return;
            if (replayCount >= MAX_REPLAYS) { alert('Replay limit reached (10).'); return; }
            stopAudio();
            playAudioFromBase64(lastAssistantAudio);
            replayCount++;
            updateReplayButton();
        }
        function updateReplayButton() {
            document.querySelectorAll('.replay-btn').forEach(b => {
                const remain = MAX_REPLAYS - replayCount;
                b.textContent = `🔁 Replay (${remain})`;
                b.disabled = remain <= 0;
            });
        }

        // EDIT/COPY (menu below message)
        function hideActionMenu() {
            if (activeMenu) {
                activeMenu.remove();
                activeMenu = null;
            }
        }

        function showActionMenu(msgDiv, userText) {
            hideActionMenu();
            const contentDiv = msgDiv.querySelector('.message-content');
            const rect = contentDiv.getBoundingClientRect();
            const containerRect = getElem('chatContainer').getBoundingClientRect();
            
            const menu = document.createElement('div');
            menu.className = 'msg-action-menu';
            menu.style.position = 'absolute';
            menu.style.top = (rect.height + 8) + 'px';
            menu.style.left = (rect.left - containerRect.left) + 'px';
            if (msgDiv.classList.contains('user')) {
                menu.style.left = 'auto';
                menu.style.right = (containerRect.right - rect.right) + 'px';
            }
            
            const copyBtn = document.createElement('button');
            copyBtn.innerHTML = '📋 Copy';
            copyBtn.onclick = (e) => {
                e.stopPropagation();
                navigator.clipboard.writeText(userText).then(() => alert('Copied!'));
                hideActionMenu();
            };
            const editBtn = document.createElement('button');
            editBtn.innerHTML = '✏️ Edit';
            editBtn.onclick = (e) => {
                e.stopPropagation();
                hideActionMenu();
                startInlineEdit(msgDiv, userText);
            };
            menu.appendChild(copyBtn);
            menu.appendChild(editBtn);
            msgDiv.style.position = 'relative';
            msgDiv.appendChild(menu);
            activeMenu = menu;
            
            const removeHandler = (e) => {
                if (!menu.contains(e.target) && !msgDiv.contains(e.target)) {
                    hideActionMenu();
                    document.removeEventListener('click', removeHandler);
                }
            };
            setTimeout(() => document.addEventListener('click', removeHandler), 10);
        }

        function startInlineEdit(msgDiv, originalText) {
            const contentDiv = msgDiv.querySelector('.message-content');
            if (!contentDiv) return;
            contentDiv.setAttribute('data-original', contentDiv.innerHTML);
            contentDiv.innerHTML = `
                <textarea class="edit-textarea">${escapeHtml(originalText)}</textarea>
                <div class="edit-actions">
                    <button class="edit-save" onclick="saveInlineEdit(this)">✔ Save & Send</button>
                    <button class="edit-cancel" onclick="cancelInlineEdit(this)">✖ Cancel</button>
                </div>
            `;
            const textarea = contentDiv.querySelector('.edit-textarea');
            textarea.focus();
            textarea.style.minHeight = '60px';
        }

        function saveInlineEdit(btn) {
            const msgDiv = btn.closest('.message');
            if (!msgDiv || !msgDiv.classList.contains('user')) return;
            const contentDiv = msgDiv.querySelector('.message-content');
            const textarea = contentDiv.querySelector('.edit-textarea');
            const newText = textarea.value.trim();
            if (!newText) return;
            
            const container = getElem('chatContainer');
            const messages = Array.from(container.querySelectorAll('.message'));
            const idx = messages.indexOf(msgDiv);
            if (idx !== -1 && idx + 1 < messages.length && messages[idx+1].classList.contains('assistant')) {
                messages[idx+1].remove();
            }
            msgDiv.remove();
            sendCustomMessage(newText);
        }

        function cancelInlineEdit(btn) {
            const msgDiv = btn.closest('.message');
            if (!msgDiv) return;
            const contentDiv = msgDiv.querySelector('.message-content');
            const original = contentDiv.getAttribute('data-original');
            if (original) contentDiv.innerHTML = original;
        }

        function escapeHtml(text) {
            return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        // SHOW THINKING with emoji (minimum 4 seconds)
        function showThinking() {
            hideThinking();
            const container = getElem('chatContainer');
            const welcome = getElem('welcomeScreen');
            if (welcome) { 
                welcome.remove(); 
                hideModeSelectorPermanently();
            }
            const div = document.createElement('div');
            div.className = 'message assistant'; div.id = 'thinkingBlock';
            div.innerHTML = `
                <div class="message-avatar">📚</div>
                <div class="message-content">
                    <div class="thinking-indicator">
                        <span class="thinking-emoji">🤔</span>
                        <span class="thinking-text">Thinking</span>
                        <span class="thinking-dots">
                            <span></span><span></span><span></span>
                        </span>
                    </div>
                </div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            thinkingEl = div;
            thinkingStartTime = Date.now();
        }

        function hideThinking() {
            if (thinkingEl) thinkingEl.remove();
            thinkingEl = null;
            const orphan = getElem('thinkingBlock');
            if (orphan) orphan.remove();
        }

        // Ensure thinking visible for at least 4 seconds before showing response
        async function showThinkingForAtLeast(ms = 4000, callback) {
            const start = Date.now();
            showThinking();
            const result = await callback();
            const elapsed = Date.now() - start;
            if (elapsed < ms) {
                await new Promise(resolve => setTimeout(resolve, ms - elapsed));
            }
            hideThinking();
            return result;
        }

        // Send message with minimum 4 second thinking display
        async function sendCustomMessage(msg) {
            if (!msg) return;
            const thisReq = ++requestId;
            stopAudio();
            replayCount = 0;
            updateReplayButton();

            addMessage('user', msg);
            
            // Show thinking and wait for API response, but enforce 4 seconds min
            try {
                const data = await showThinkingForAtLeast(4000, async () => {
                    const res = await fetch('/api/chat', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({message: msg, mode: currentMode, chat_id: currentChatId})
                    });
                    if (!res.ok) throw new Error('API error');
                    return await res.json();
                });
                
                if (thisReq !== requestId) return;

                if (data.status === 'success') {
                    let audioBase64 = null;
                    try {
                        const vRes = await fetch('/api/speak',
                            {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({text: data.response})});
                        const vData = await vRes.json();
                        if (vData.success) audioBase64 = vData.audio;
                    } catch(e){}

                    if (voiceEnabled && audioBase64) {
                        stopAudio();
                        playAudioFromBase64(audioBase64);
                    }
                    addMessage('assistant', data.response, null, audioBase64);
                    if (audioBase64) {
                        lastAssistantAudio = audioBase64;
                        replayCount = 0;
                        updateReplayButton();
                    } else {
                        lastAssistantAudio = null;
                        replayCount = 0;
                        updateReplayButton();
                    }
                }
            } catch(e) { 
                if (thisReq === requestId) hideThinking(); 
            }
        }

        async function sendMessage() {
            const input = getElem('chatInput');
            const msg = input.value.trim();
            if (!msg) return;
            input.value = '';
            await sendCustomMessage(msg);
        }

        function addMessage(role, content, imageUrl = null, audioBase64 = null) {
            const container = getElem('chatContainer');
            const welcome = getElem('welcomeScreen');
            if (welcome) {
                welcome.remove();
                hideModeSelectorPermanently();
            }

            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            const avatar = document.createElement('div'); avatar.className = 'message-avatar';
            avatar.textContent = role === 'user' ? USER_INITIAL : '📚';

            const contentDiv = document.createElement('div'); contentDiv.className = 'message-content';
            let formattedContent = formatText(content);
            if (imageUrl) formattedContent += `<br><img src="${imageUrl}" style="max-width:200px; border-radius:10px;">`;
            contentDiv.innerHTML = formattedContent;
            if (role === 'assistant' && audioBase64) {
                const replayBtn = document.createElement('div');
                replayBtn.className = 'msg-actions';
                replayBtn.style.marginTop = '8px';
                const remain = MAX_REPLAYS - replayCount;
                replayBtn.innerHTML = `<button class="msg-btn replay-btn" onclick="replayLastAssistant()" ${remain <= 0 ? 'disabled' : ''}>🔁 Replay (${remain})</button>`;
                contentDiv.appendChild(replayBtn);
            }

            msgDiv.appendChild(avatar); msgDiv.appendChild(contentDiv);
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;

            if (role === 'user') {
                msgDiv.addEventListener('click', (e) => {
                    if (e.target.closest('.msg-action-menu')) return;
                    if (e.target.closest('.edit-save') || e.target.closest('.edit-cancel')) return;
                    hideActionMenu();
                    showActionMenu(msgDiv, content);
                });
            }
            return msgDiv;
        }

        function formatText(text) {
            return text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
        }

        function hideModeSelectorPermanently() {
            const center = getElem('modeSelectorCenter');
            if (center) center.style.display = 'none';
        }

        function newChat() {
            currentChatId = generateId();
            const container = getElem('chatContainer');
            container.innerHTML = `
                <div class="welcome-screen" id="welcomeScreen">
                    <div class="welcome-logo">📚</div>
                    <h2 class="welcome-title">New Conversation</h2>
                    <p class="welcome-subtitle">Ask me anything!</p>
                    <div class="mode-selector-center" id="modeSelectorCenter">
                        <button class="mode-btn-big active" onclick="setMode('instant',this)">⚡ Fast Answer</button>
                        <button class="mode-btn-big" onclick="setMode('expert',this)">🎓 Deep Learn</button>
                    </div>
                </div>`;
            lastAssistantAudio = null;
            replayCount = 0;
            stopAudio();
            updateReplayButton();
            requestId = 0;
            hideActionMenu();
        }

        // Load existing chat from URL if needed
        (function(){
            const params = new URLSearchParams(window.location.search);
            const cid = params.get('chat_id');
            if(cid){
                currentChatId = cid;
                fetch('/api/history/messages/'+cid).then(r=>r.json()).then(d=>{
                    if(d.success && d.messages.length){
                        const welcome = getElem('welcomeScreen');
                        if(welcome) { 
                            welcome.remove(); 
                            hideModeSelectorPermanently();
                        }
                        d.messages.forEach(m=>{ 
                            if(m.role!=='system') 
                                addMessage(m.role==='user'?'user':'assistant', m.content, m.image_url); 
                        });
                    }
                });
            }
        })();
    </script>
</body>
</html>
